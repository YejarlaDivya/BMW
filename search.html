<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: white;
}

/* HEADER */
.header {
    
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid #ddd;
}

.search-icon {
    font-size: 26px;
    margin-right: 15px;
}

/* SEARCH BOX */
.search-box {
    width: 100%;
}

.search-box input {
    width: 100%;
    padding: 12px 15px;
    font-size: 18px;
    border: none;
    outline: none;
    border-bottom: 2px solid black;
}
</style>
</head>

<body>

<div class="header">
    <div class="search-icon">🔍</div>

    <div class="search-box">
        <input type="text" placeholder="Search BMW models">
    </div>
</div>

</body>
</html>
